version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: sigfa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sigfa
      MYSQL_USER: sigfa
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usigfa", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigfa_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_KEY: base64:U94iz8bvS62UYJhuGn04VHqxPnMo/LncAISAufESBpI=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sigfa
      DB_USERNAME: sigfa
      DB_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET:-Fk3okKhPZdbpfLk33lfCylmJbyUGZ7nhuxs0w5dRGZ7PLSQBtI1uFYJvwbG7Oy5y}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/public:/var/www/html/public

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sigfa_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000/api

volumes:
  mysql_data:
