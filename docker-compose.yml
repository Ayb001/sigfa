version: '3.9'

services:

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sigfa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sigfa
      MYSQL_USER: sigfa
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usigfa", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel backend (PHP-FPM + Nginx via supervisord) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigfa_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME_RUN_artisan_key_generate}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sigfa
      DB_USERNAME: sigfa
      DB_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_run_artisan_jwt_secret}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/var/www/html/storage

  # ── React web app (Vite build → Nginx, /api proxied to backend) ───────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sigfa_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
  backend_storage:
